name: meetings_app
description: A production-ready Flutter Supabase starter using Clean Architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  app_links: ^7.0.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  supabase_flutter: ^2.14.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  shared_preferences: ^2.5.3
  maplibre_gl: ^0.26.1
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  posthog_flutter: ^5.26.0
  sentry_flutter: ^9.21.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
